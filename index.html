<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCM Colourful Pro Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #ec4899, #8b5cf6); border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-pink-100 via-purple-50 to-blue-100">

    <div class="h-72 bg-gradient-to-r from-pink-500 via-purple-600 to-indigo-600 rounded-b-[4rem] shadow-2xl absolute w-full z-0 overflow-hidden">
        <div class="absolute top-0 left-0 w-40 h-40 bg-white/10 rounded-full -translate-x-10 -translate-y-10 blur-xl"></div>
    </div>

    <div class="relative z-10 max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center text-white mb-8">
            <div class="mb-6 md:mb-0 text-center md:text-left fade-in-up">
                <h1 class="text-4xl font-extrabold flex items-center justify-center md:justify-start gap-3 drop-shadow-md">
                    <div class="p-3 bg-white/25 rounded-2xl backdrop-blur-md shadow-inner">
                        <i data-lucide="rocket" class="w-8 h-8 text-yellow-300"></i>
                    </div>
                    RCM डिजिटल मार्केटर
                </h1>
                <p class="text-pink-100 mt-2 text-lg font-medium ml-1">नमस्कार {नाव} जी, तुमचा डेटा सुरक्षित आहे! ✨</p>
            </div>
            <button onclick="exportReport()" class="px-6 py-3 bg-white text-purple-600 rounded-full text-sm font-bold shadow-lg hover:scale-105 transition flex gap-2">
                <i data-lucide="download-cloud" class="w-5 h-5"></i> रिपोर्ट सेव्ह करा
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 fade-in-up" style="animation-delay: 0.2s">
            <div class="bg-gradient-to-br from-blue-400 to-indigo-600 p-6 rounded-3xl shadow-xl text-white flex justify-between transform hover:scale-105 transition">
                <div><p class="text-blue-100 font-bold text-sm uppercase">एकूण संपर्क</p><h2 class="text-4xl font-extrabold" id="totalCountDisplay">0</h2></div>
                <div class="bg-white/20 p-4 rounded-2xl"><i data-lucide="users" class="w-8 h-8 text-white"></i></div>
            </div>
            <div class="bg-gradient-to-br from-orange-400 via-pink-500 to-rose-500 p-6 rounded-3xl shadow-xl text-white flex justify-between transform hover:scale-105 transition">
                <div><p class="text-pink-100 font-bold text-sm uppercase">बाकी (Pending)</p><h2 class="text-4xl font-extrabold" id="pendingCount">0</h2></div>
                <div class="bg-white/20 p-4 rounded-2xl"><i data-lucide="clock" class="w-8 h-8 text-white animate-pulse"></i></div>
            </div>
            <div class="bg-gradient-to-br from-teal-400 to-emerald-600 p-6 rounded-3xl shadow-xl text-white flex justify-between transform hover:scale-105 transition">
                <div><p class="text-teal-100 font-bold text-sm uppercase">पूर्ण (Sent)</p><h2 class="text-4xl font-extrabold" id="sentCountVal">0</h2></div>
                <div class="bg-white/20 p-4 rounded-2xl"><i data-lucide="check-circle" class="w-8 h-8 text-white"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in-up" style="animation-delay: 0.3s">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-3xl shadow-lg border-t-4 border-purple-400">
                    <h3 class="font-bold text-gray-700 text-lg mb-4 flex items-center gap-2"><i data-lucide="file-spreadsheet" class="text-purple-500"></i> एक्सेल फाइल जोडा</h3>
                    <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-purple-100 file:text-purple-700 hover:file:bg-purple-200 cursor-pointer border rounded-lg p-2 bg-white/50">
                    <p id="fileNameDisplay" class="text-xs text-purple-500 mt-2 font-medium"></p>
                </div>

                <div class="glass-card p-6 rounded-3xl shadow-lg border-t-4 border-pink-400">
                    <h3 class="font-bold text-gray-700 text-lg mb-2 flex items-center gap-2"><i data-lucide="message-circle" class="text-pink-500"></i> मेसेज लिहा</h3>
                    
                    <div class="bg-pink-50 border border-pink-200 p-3 rounded-xl mb-3 text-xs text-pink-700">
                        <strong>टीप:</strong> "नमस्कार [नाव] जी" आपोआप जोडले जाईल. तुम्ही फक्त मुख्य मेसेज लिहा.
                    </div>

                    <textarea id="msgInput" rows="5" class="w-full p-4 bg-white/60 border-2 border-pink-200 rounded-xl focus:border-pink-500 focus:ring-4 focus:ring-pink-100 outline-none transition text-gray-700 text-sm" placeholder="इथे फक्त तुमचा मेसेज लिहा (उदा. उद्या सेमिनार आहे)..."></textarea>
                    
                    <button onclick="clearList()" class="mt-4 w-full py-2 text-sm text-red-500 bg-red-50 rounded-lg hover:bg-red-100 flex justify-center gap-2 font-semibold">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> रिसेट करा (सर्व डेटा पुसा)
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-card rounded-3xl shadow-xl overflow-hidden flex flex-col h-[600px] border-t-4 border-blue-400 relative">
                <div class="p-5 bg-gradient-to-r from-blue-50 to-purple-50 border-b flex justify-between items-center sticky top-0 z-20">
                    <h3 class="font-bold text-xl text-blue-700 flex items-center gap-2"><i data-lucide="list" class="w-5 h-5"></i> ग्राहक यादी</h3>
                    <div class="flex bg-white rounded-full p-1 shadow-sm">
                        <button onclick="setFilter('all')" id="btn-all" class="px-4 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow">सर्व</button>
                        <button onclick="setFilter('pending')" id="btn-pending" class="px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:bg-purple-50">बाकी</button>
                        <button onclick="setFilter('sent')" id="btn-sent" class="px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:bg-green-50">झालेले</button>
                    </div>
                </div>

                <div class="overflow-y-auto flex-1 p-4 bg-white/40">
                    <table class="w-full">
                        <tbody id="tableBody">
                            <tr><td colspan="4" class="text-center p-10 text-gray-400">डेटा लोड होत आहे किंवा फाइल अपलोड करा...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let excelData = [];
        let currentFilter = 'all';

        // 1. पेज लोड झाल्यावर जुना डेटा (Local Storage) तपासा
        window.onload = function() {
            const savedData = localStorage.getItem('rcmData');
            const savedMsg = localStorage.getItem('rcmMsg');

            if (savedData) {
                excelData = JSON.parse(savedData);
                updateStats();
                renderTable();
            } else {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="text-center p-10 text-gray-400">फाइल अपलोड करा...</td></tr>';
            }

            if (savedMsg) {
                document.getElementById('msgInput').value = savedMsg;
            }
            lucide.createIcons();
        };

        // 2. डेटा Local Storage मध्ये सेव्ह करा
        function saveToLocal() {
            localStorage.setItem('rcmData', JSON.stringify(excelData));
        }

        // 3. मेसेज टाइप करताना सुद्धा सेव्ह करा
        document.getElementById('msgInput').addEventListener('input', function(e) {
            localStorage.setItem('rcmMsg', e.target.value);
        });

        // Load Excel
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = "📂 " + file.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

                // जुन्या डेटा मध्ये नवीन डेटा ॲड करा किंवा रिप्लेस करा (येथे रिप्लेस केला आहे)
                excelData = jsonData.slice(1).map(row => ({
                    name: row[0] ? row[0].toString().trim() : 'Sir/Ma\'am',
                    number: row[1] ? row[1].toString() : '',
                    status: 'pending'
                })).filter(item => item.number.length >= 10);

                saveToLocal(); // सेव्ह करा
                updateStats();
                renderTable();
            };
            reader.readAsArrayBuffer(file);
        });

        // Send Message Logic
        function sendWhatsApp(index) {
            const item = excelData[index];
            let rawMsg = document.getElementById('msgInput').value;
            
            if (!rawMsg.trim()) { alert("कृपया मेसेज लिहा!"); return; }

            let finalMsg = "";
            if (rawMsg.includes("{name}")) {
                finalMsg = rawMsg.replace(/{name}/g, item.name);
            } else {
                finalMsg = `नमस्कार ${item.name} जी,\n\n${rawMsg}`;
            }

            let cleanNumber = item.number.replace(/[^0-9]/g, '');
            if (cleanNumber.length === 10) cleanNumber = '91' + cleanNumber;

            window.open(`https://wa.me/${cleanNumber}?text=${encodeURIComponent(finalMsg)}`, '_blank');

            excelData[index].status = 'sent';
            
            saveToLocal(); // स्टेटस बदलल्यानंतर लगेच सेव्ह करा
            updateStats();
            renderTable();
        }

        // UI Rendering (Table)
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let filteredData = excelData;
            if (currentFilter === 'pending') filteredData = excelData.filter(d => d.status === 'pending');
            if (currentFilter === 'sent') filteredData = excelData.filter(d => d.status === 'sent');

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center p-8 text-gray-500">डेटा नाही.</td></tr>';
                return;
            }

            filteredData.forEach((item) => {
                const originalIndex = excelData.indexOf(item);
                const tr = document.createElement('tr');
                tr.className = "bg-white/80 border-b border-gray-100 hover:bg-purple-50 transition rounded-xl block md:table-row mb-2 shadow-sm";
                
                const btn = item.status === 'sent' 
                    ? `<button disabled class="px-4 py-2 bg-gray-200 text-gray-500 rounded-lg text-xs font-bold cursor-not-allowed">SENT</button>`
                    : `<button onclick="sendWhatsApp(${originalIndex})" class="px-5 py-2 bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-lg text-xs font-bold shadow-md hover:scale-105 transition">पाठवा</button>`;

                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-700">${item.name}</td>
                    <td class="p-4 text-sm text-gray-500 font-mono">${item.number}</td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <a href="tel:${item.number}" class="p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200"><i data-lucide="phone" class="w-4 h-4"></i></a>
                        ${btn}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        // Helper Functions
        function setFilter(filterType) {
            currentFilter = filterType;
            ['all', 'pending', 'sent'].forEach(f => {
                const btn = document.getElementById(`btn-${f}`);
                btn.className = (f === filterType) 
                    ? "px-4 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow scale-105 transition"
                    : "px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:bg-gray-100 transition";
            });
            renderTable();
        }

        function clearList() {
            if(confirm("सर्व डेटा कायमचा डिलीट करायचा का? (हे परत आणता येणार नाही)")) {
                excelData = [];
                localStorage.removeItem('rcmData'); // स्टोरेज क्लिअर करा
                localStorage.removeItem('rcmMsg');
                
                document.getElementById('fileInput').value = '';
                document.getElementById('msgInput').value = '';
                updateStats();
                renderTable();
            }
        }

        function exportReport() {
            if (excelData.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(excelData.map(i => ({ "Name": i.name, "Number": i.number, "Status": i.status })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "RCM_Report.xlsx");
        }

        function updateStats() {
            const total = excelData.length;
            const sent = excelData.filter(x => x.status === 'sent').length;
            document.getElementById('totalCountDisplay').innerText = total;
            document.getElementById('pendingCount').innerText = total - sent;
            document.getElementById('sentCountVal').innerText = sent;
        }

        lucide.createIcons();
    </script>
</body>
</html>
