<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCM Colourful Pro Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        select[multiple] { height: 150px; border: 2px solid #e2e8f0; border-radius: 12px; padding: 5px; }
        select option { padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        select option:checked { background-color: #8b5cf6 !important; color: white; }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-pink-100 via-purple-50 to-blue-100">

    <div class="h-72 bg-gradient-to-r from-pink-500 via-purple-600 to-indigo-600 rounded-b-[4rem] shadow-2xl absolute w-full z-0 overflow-hidden"></div>

    <div class="relative z-10 max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center text-white mb-8">
            <div class="mb-6 md:mb-0 text-center md:text-left">
                <h1 class="text-4xl font-extrabold flex items-center justify-center md:justify-start gap-3">
                    <div class="p-3 bg-white/25 rounded-2xl backdrop-blur-md">
                        <i data-lucide="rocket" class="w-8 h-8 text-yellow-300"></i>
                    </div>
                    RCM डिजिटल मार्केटर
                </h1>
                <p class="text-pink-100 mt-2 text-lg font-medium ml-1">शहरे निवडा आणि फिल्टर बटण दाबा! ✨</p>
            </div>
            <button onclick="exportReport()" class="px-6 py-3 bg-white text-purple-600 rounded-full text-sm font-bold shadow-lg hover:scale-105 transition flex gap-2">
                <i data-lucide="download-cloud" class="w-5 h-5"></i> रिपोर्ट सेव्ह करा
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gradient-to-br from-blue-400 to-indigo-600 p-6 rounded-3xl shadow-xl text-white flex justify-between transform hover:scale-105 transition">
                <div><p class="text-blue-100 font-bold text-sm uppercase">एकूण संपर्क</p><h2 class="text-4xl font-extrabold" id="totalCountDisplay">0</h2></div>
                <div class="bg-white/20 p-4 rounded-2xl"><i data-lucide="users" class="w-8 h-8 text-white"></i></div>
            </div>
            <div class="bg-gradient-to-br from-orange-400 via-pink-500 to-rose-500 p-6 rounded-3xl shadow-xl text-white flex justify-between transform hover:scale-105 transition">
                <div><p class="text-pink-100 font-bold text-sm uppercase">बाकी (Pending)</p><h2 class="text-4xl font-extrabold" id="pendingCount">0</h2></div>
                <div class="bg-white/20 p-4 rounded-2xl"><i data-lucide="clock" class="w-8 h-8 text-white"></i></div>
            </div>
            <div class="bg-gradient-to-br from-teal-400 to-emerald-600 p-6 rounded-3xl shadow-xl text-white flex justify-between transform hover:scale-105 transition">
                <div><p class="text-teal-100 font-bold text-sm uppercase">पूर्ण (Sent)</p><h2 class="text-4xl font-extrabold" id="sentCountVal">0</h2></div>
                <div class="bg-white/20 p-4 rounded-2xl"><i data-lucide="check-circle" class="w-8 h-8 text-white"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-3xl shadow-lg border-t-4 border-purple-400">
                    <h3 class="font-bold text-gray-700 text-lg mb-4 flex items-center gap-2"><i data-lucide="file-spreadsheet" class="text-purple-500"></i> एक्सेल फाइल जोडा</h3>
                    <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 border rounded-lg p-2 bg-white/50 cursor-pointer">
                </div>

                <div class="glass-card p-6 rounded-3xl shadow-lg border-t-4 border-blue-400">
                    <h3 class="font-bold text-gray-700 text-lg mb-2 flex items-center gap-2"><i data-lucide="map-pin" class="text-blue-500"></i> १. शहरे निवडा</h3>
                    <p class="text-[10px] text-blue-500 mb-2 font-bold">शहरावर क्लिक करून खालील निळे बटण दाबा.</p>
                    <select id="cityFilter" multiple class="w-full bg-white outline-none shadow-inner mb-4">
                        <option value="all" selected>सर्व शहरे (All)</option>
                    </select>
                    <button onclick="renderTable()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-700 transition flex justify-center gap-2">
                        <i data-lucide="filter" class="w-5 h-5"></i> फिल्टर अप्लाय करा
                    </button>
                </div>

                <div class="glass-card p-6 rounded-3xl shadow-lg border-t-4 border-pink-400">
                    <h3 class="font-bold text-gray-700 text-lg mb-2 flex items-center gap-2"><i data-lucide="message-circle" class="text-pink-500"></i> २. मेसेज लिहा</h3>
                    <textarea id="msgInput" rows="5" class="w-full p-4 border-2 border-pink-200 rounded-xl outline-none text-sm" placeholder="तुमचा मेसेज..."></textarea>
                    <button onclick="clearList()" class="mt-4 w-full py-2 text-xs text-red-500 bg-red-50 rounded-lg font-bold">रिसेट करा</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-card rounded-3xl shadow-xl overflow-hidden flex flex-col h-[600px] border-t-4 border-blue-400 relative">
                <div class="p-5 bg-white/90 border-b flex justify-between items-center sticky top-0 z-20">
                    <h3 class="font-bold text-xl text-blue-700 flex items-center gap-2"><i data-lucide="list"></i> ग्राहक यादी</h3>
                    <div class="flex bg-gray-100 rounded-full p-1">
                        <button onclick="setStatusFilter('all')" id="btn-all" class="px-4 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow">सर्व</button>
                        <button onclick="setStatusFilter('pending')" id="btn-pending" class="px-4 py-1.5 rounded-full text-xs font-bold text-gray-500">बाकी</button>
                    </div>
                </div>

                <div class="overflow-y-auto flex-1 p-4 bg-white/40">
                    <table class="w-full">
                        <tbody id="tableBody">
                            <tr><td class="text-center p-10 text-gray-400">एक्सेल फाइल जोडून 'फिल्टर अप्लाय' करा.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let excelData = [];
        let currentStatusFilter = 'all';

        window.onload = function() {
            const savedData = localStorage.getItem('rcmOriginalData');
            const savedMsg = localStorage.getItem('rcmOriginalMsg');
            if (savedData) {
                excelData = JSON.parse(savedData);
                updateCityDropdown();
                renderTable();
            }
            if (savedMsg) document.getElementById('msgInput').value = savedMsg;
            lucide.createIcons();
        };

        document.getElementById('msgInput').addEventListener('input', (e) => localStorage.setItem('rcmOriginalMsg', e.target.value));

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

                excelData = jsonData.slice(1).map(row => ({
                    name: row[0] ? row[0].toString().trim() : 'Sir/Ma\'am',
                    number: row[1] ? row[1].toString().trim() : '',
                    city: row[2] ? row[2].toString().trim() : 'इतर',
                    status: 'pending'
                })).filter(item => item.number.length >= 10);

                localStorage.setItem('rcmOriginalData', JSON.stringify(excelData));
                updateCityDropdown();
                renderTable();
            };
            reader.readAsArrayBuffer(file);
        });

        function updateCityDropdown() {
            const dropdown = document.getElementById('cityFilter');
            const cities = [...new Set(excelData.map(item => item.city))].sort();
            dropdown.innerHTML = '<option value="all" selected>सर्व शहरे (All)</option>';
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.innerText = city;
                dropdown.appendChild(opt);
            });
        }

        function setStatusFilter(f) {
            currentStatusFilter = f;
            document.getElementById('btn-all').className = f === 'all' ? "px-4 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow" : "px-4 py-1.5 rounded-full text-xs font-bold text-gray-500";
            document.getElementById('btn-pending').className = f === 'pending' ? "px-4 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow" : "px-4 py-1.5 rounded-full text-xs font-bold text-gray-500";
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const citySelect = document.getElementById('cityFilter');
            const selectedOptions = Array.from(citySelect.selectedOptions).map(option => option.value);
            
            tbody.innerHTML = '';
            
            let filtered = excelData.filter(d => {
                const cityMatch = selectedOptions.includes('all') || selectedOptions.includes(d.city);
                const statusMatch = (currentStatusFilter === 'all' || d.status === currentStatusFilter);
                return cityMatch && statusMatch;
            });

            // Update Stats
            const total = filtered.length;
            const sent = filtered.filter(x => x.status === 'sent').length;
            document.getElementById('totalCountDisplay').innerText = total;
            document.getElementById('pendingCount').innerText = total - sent;
            document.getElementById('sentCountVal').innerText = sent;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td class="text-center p-8 text-gray-500">माहिती उपलब्ध नाही.</td></tr>';
                return;
            }

            filtered.forEach((item) => {
                const idx = excelData.indexOf(item);
                const tr = document.createElement('tr');
                tr.className = "bg-white/80 border-b border-gray-100 hover:bg-purple-50 transition block md:table-row mb-2 shadow-sm rounded-xl";
                
                const btn = item.status === 'sent' 
                    ? `<span class="text-green-600 font-bold text-xs p-4">पाठवले ✓</span>`
                    : `<button onclick="sendWhatsApp(${idx})" class="px-5 py-2 bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-lg text-xs font-bold shadow-md">पाठवा</button>`;

                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-700">${item.name}<br><span class="text-[10px] text-blue-500 uppercase">${item.city}</span></td>
                    <td class="p-4 text-sm text-gray-500 font-mono">${item.number}</td>
                    <td class="p-4 text-right flex justify-end gap-2 items-center">
                        <a href="tel:${item.number}" class="p-2 bg-blue-100 text-blue-600 rounded-lg"><i data-lucide="phone" class="w-4 h-4"></i></a>
                        ${btn}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function sendWhatsApp(index) {
            const item = excelData[index];
            const msg = document.getElementById('msgInput').value;
            if (!msg) { alert("मेसेज लिहा!"); return; }
            const finalMsg = `नमस्कार ${item.name} जी,\n\n${msg}`;
            let num = item.number.replace(/[^0-9]/g, '');
            if (num.length === 10) num = '91' + num;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(finalMsg)}`, '_blank');
            excelData[index].status = 'sent';
            localStorage.setItem('rcmOriginalData', JSON.stringify(excelData));
            renderTable();
        }

        function clearList() {
            if(confirm("डेटा पुसायचा का?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportReport() {
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "RCM_Report.xlsx");
        }
        lucide.createIcons();
    </script>
</body>
</html>
